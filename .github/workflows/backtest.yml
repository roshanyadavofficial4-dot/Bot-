name: Trading Bot Backtest CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Trading symbol (e.g. DOGE/USDT:USDT)'
        required: false
        default: 'DOGE/USDT:USDT'
      months:
        description: 'Months of data to use for backtest'
        required: false
        default: '3'

jobs:
  backtest:
    name: Run Full Backtest Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      USE_SANDBOX: "True"
      BINANCE_API_KEY: ""
      BINANCE_SECRET: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      TELEGRAM_ADMIN_ID: ""
      BASE_ASSET: "USDT"
      INITIAL_CAPITAL: "2.4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/historical
          mkdir -p model
          mkdir -p backtest/results
          mkdir -p logs

      - name: Download historical data (Binance Futures)
        run: |
          python scripts/download_data.py

      - name: Train ML model on real data
        run: |
          python scripts/train_realdata.py --no-backtest

      - name: Run v5.1 Backtest (backtest_v51.py)
        run: |
          python -c "
          import sys, json, logging, os
          import pandas as pd
          import joblib
          from pathlib import Path
          from backtest.backtest_v51 import BacktestV51

          logging.basicConfig(level=logging.INFO,
                              format='%(asctime)s  %(levelname)-8s  %(message)s',
                              datefmt='%H:%M:%S')

          DATA_DIR = Path('data/historical')
          csv_files = list(DATA_DIR.glob('*.csv'))
          if not csv_files:
              print('No CSV files found — skipping backtest.')
              sys.exit(0)

          dfs = {}
          TIMEFRAME_SUFFIXES = ['_5m', '_15m', '_1h', '_4h', '_1d']
          for f in csv_files:
              stem = f.stem
              for tf in TIMEFRAME_SUFFIXES:
                  if stem.endswith(tf):
                      stem = stem[:-len(tf)]
                      break
              sym = stem.replace('_USDT_USDT', '/USDT:USDT')
              try:
                  df = pd.read_csv(f)
                  if not df.empty:
                      dfs[sym] = df
                      print(f'Loaded {sym}: {len(df)} rows')
              except Exception as e:
                  print(f'Skipping {f.name}: {e}')

          if not dfs:
              print('No valid DataFrames loaded — skipping backtest.')
              sys.exit(0)

          model_payload = None
          model_path = Path('model/trading_bot_v51.joblib')
          if model_path.exists():
              try:
                  model_payload = joblib.load(model_path)
                  print(f'Model loaded from {model_path}')
              except Exception as e:
                  print(f'Model load failed (will use heuristic): {e}')

          try:
              engine  = BacktestV51(initial_balance=2.4, model_payload=model_payload)
              results = engine.run(dfs)
          except Exception as e:
              print(f'BacktestV51 error: {e}')
              sys.exit(1)

          out_path = Path('backtest/results/backtest_results.json')
          out_path.parent.mkdir(parents=True, exist_ok=True)
          with open(out_path, 'w') as fh:
              summary = results.get('summary', {})
              json.dump(summary, fh, indent=2, default=str)
          print(json.dumps(summary, indent=2, default=str))
          "

      - name: Run legacy simple backtest (historical_test.py)
        run: |
          python backtest/historical_test.py
        continue-on-error: true

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ github.run_number }}
          path: |
            backtest/results/
            logs/
          retention-days: 30

      - name: Validate backtest quality gates
        run: |
          python -c "
          import json, sys
          from pathlib import Path

          result_file = Path('backtest/results/backtest_results.json')
          if not result_file.exists():
              print('WARNING: No backtest results file found — skipping quality gate check.')
              sys.exit(0)

          with open(result_file) as f:
              s = json.load(f)

          total_trades = s.get('total_trades', 0)
          max_dd       = s.get('max_drawdown_pct', 0)

          print('=== QUALITY GATE CHECK ===')
          print(f'  Total trades   : {total_trades}')
          print(f'  Win rate       : {round(s.get(\"win_rate\", 0) * 100, 1)}%')
          print(f'  Profit factor  : {s.get(\"profit_factor\", 0)}')
          print(f'  Expectancy/tr  : \${s.get(\"expectancy_usd\", 0):.4f}')
          print(f'  Max drawdown   : {max_dd:.2f}%')
          print(f'  Total return   : {s.get(\"total_return_pct\", 0):.2f}%')
          print()

          if max_dd < -30.0:
              print('HARD FAIL: Max drawdown exceeded -30%.')
              sys.exit(1)

          if total_trades == 0:
              print('WARNING: 0 trades found. Strategy logic intact.')
              sys.exit(0)

          hard_fails = []
          if s.get('profit_factor', 0) < 0.5:
              hard_fails.append(f'Profit factor {s.get(\"profit_factor\", 0):.3f} < 0.5')
          if max_dd < -25.0:
              hard_fails.append(f'Max drawdown {max_dd:.2f}% < -25%')

          if hard_fails:
              for msg in hard_fails:
                  print(f'HARD FAIL: {msg}')
              sys.exit(1)

          print('All quality gates passed.')
          "
